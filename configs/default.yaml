# configs/default.yaml
defaults:
  - model: default
  - train: default
  - inference: default
  - _self_

project:
  name: composite_material_ai
  version: 0.1.0
  seed: 42
  debug: false

data:
  raw_path: ${project.root}/data/raw
  processed_path: ${project.root}/data/processed
  external_path: ${project.root}/data/external
  test_size: 0.2
  val_size: 0.2
  batch_size: 32
  num_workers: 4
  pin_memory: true

logging:
  log_dir: ${project.root}/logs
  checkpoint_dir: ${project.root}/checkpoints
  output_dir: ${project.root}/outputs
  tensorboard_dir: ${project.root}/logs/tensorboard
  wandb:
    project: composite-material-ai
    entity: null
    mode: online

device:
  use_cuda: true
  cuda_device: 0
  use_mps: false  # For Apple Silicon
